<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECH Workers 配置</title>
  <style>
    body { padding: 20px; font-family: sans-serif; background: #f5f5f5; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    .btn-group { margin-top: 20px; display: flex; gap: 10px; }
    button { padding: 10px 20px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
    #status { margin-top: 15px; padding: 10px; border-radius: 4px; background: #e9ecef; }
  </style>
  <script type="module" src="script.js"></script>
</head>
<body>
  <h1>ECH Workers 代理配置</h1>
  <div class="form-group">
    <label>服务端地址（必填）</label>
    <input type="text" id="server_addr" placeholder="例如：your-worker.workers.dev:443">
  </div>
  <div class="form-group">
    <label>本地监听端口</label>
    <input type="number" id="local_port" placeholder="默认：30000" value="30000">
  </div>
  <div class="form-group">
    </label>
    <input type="text" id="doh_server" placeholder="默认：dns.alidns.com/dns-query" value="dns.alidns.com/dns-query">
  </div>
  <div class="form-group">
    <label>ECH 查询域名</label>
    <input type="text" id="ech_domain" placeholder="默认：cloudflare-ech.com" value="cloudflare-ech.com">
  </div>
  <div class="form-group">
    <label>优选 IP（可选）</label>
    <input type="text" id="preferred_ip" placeholder="绕过 DNS 解析，直接指定 IP">
  </div>
  <div class="form-group">
    <label>身份令牌（可选）</label>
    <input type="text" id="auth_token" placeholder="服务端验证令牌">
  </div>
  <div class="form-group">
    <label>分流模式</label>
    <select id="routing_mode">
      <option value="global">全局代理</option>
      <option value="bypass_cn">跳过中国大陆</option>
      <option value="none">直连模式</option>
    </select>
  </div>
  <div class="btn-group">
    <button id="saveBtn">保存配置</button>
    <button id="startBtn">启动代理</button>
    <button id="stopBtn">停止代理</button>
  </div>
  <div id="status">当前状态：未检测</div>
</body>
</html>
