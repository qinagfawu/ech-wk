name: Build ECH Workers KSU Module

on:
  push:
    tags:
      - 'v*'  # 打 v 开头的标签时触发发布（如 v1.4）
  workflow_dispatch:  # 支持手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 一个架构失败不影响其他架构
      matrix:
        arch: [arm64, arm, x86, x64]  # 覆盖所有安卓主流架构

    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 配置 Go 环境（1.23+ 支持 ECH）
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true  # 缓存 Go 依赖，加快构建

      - name: 交叉编译 ech-workers 二进制（按架构）
        run: |
          # 自动补全依赖和 go.sum 校验和（核心修复校验和不匹配问题）
          go mod tidy
          
          # 根据架构编译
          case ${{ matrix.arch }} in
            arm64)
              GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o ech-workers-${{ matrix.arch }} ech-workers.go
              ;;
            arm)
              GOOS=android GOARCH=arm GOARM=7 go build -ldflags="-s -w" -o ech-workers-${{ matrix.arch }} ech-workers.go
              ;;
            x86)
              GOOS=android GOARCH=386 go build -ldflags="-s -w" -o ech-workers-${{ matrix.arch }} ech-workers.go
              ;;
            x64)
              GOOS=android GOARCH=amd64 go build -ldflags="-s -w" -o ech-workers-${{ matrix.arch }} ech-workers.go
              ;;
          esac
          
          # 可选：压缩二进制体积（如需压缩保留，不需要则删除下面这行）
          # sudo apt install -y upx && upx --best ech-workers-${{ matrix.arch }} || echo "UPX 压缩失败，跳过"

      - name: 准备 KSU 模块打包目录
        run: |
          # 创建模块基础目录
          mkdir -p ksu-build/bin
          mkdir -p ksu-build/scripts
          mkdir -p ksu-build/webroot
          
          # 复制编译好的二进制到模块目录
          cp ech-workers-${{ matrix.arch }} ksu-build/bin/ech-workers
          
          # 复制模板文件到构建目录
          cp ksu-template/module.prop ksu-build/
          cp ksu-template/customize.sh ksu-build/
          cp ksu-template/service.sh ksu-build/
          cp ksu-template/uninstall.sh ksu-build/
          cp ksu-template/scripts/start.sh ksu-build/scripts/
          cp ksu-template/webroot/* ksu-build/webroot/
          
          # 设置可执行权限
          chmod +x ksu-build/bin/ech-workers
          chmod +x ksu-build/scripts/*
          chmod +x ksu-build/*.sh
          
          # 打包成 ZIP（KSU 可刷入格式）
          cd ksu-build
          zip -r ../ech-workers-ksu-${{ matrix.arch }}.zip ./*
          cd ..

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')  # 仅打标签时发布
        with:
          files: |
            ech-workers-ksu-${{ matrix.arch }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动提供的令牌，无需手动配置
