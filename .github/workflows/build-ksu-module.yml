name: Build ECH Workers KSU Module (arm64 only)

on:
  push:
    tags:
      - 'v1.4'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [arm64]  # 只构建 arm64，适配你的手机

    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 配置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false  # 关闭缓存，避免旧 go.sum 干扰

      - name: 清理旧依赖并重新初始化
        run: |
          rm -f go.sum go.mod
          go mod init github.com/byJoey/ech-wk
          go get github.com/gorilla/websocket@v1.5.1
          go mod tidy

      - name: 编译 arm64 版本
        run: |
          GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o ech-workers-arm64 ech-workers.go

      - name: 打包 KSU 模块
        run: |
          mkdir -p ksu-build/bin
          mkdir -p ksu-build/scripts
          mkdir -p ksu-build/webroot
          
          cp ech-workers-arm64 ksu-build/bin/ech-workers
          cp ksu-template/module.prop ksu-build/
          cp ksu-template/customize.sh ksu-build/
          cp ksu-template/service.sh ksu-build/
          cp ksu-template/uninstall.sh ksu-build/
          cp ksu-template/scripts/start.sh ksu-build/scripts/
          cp ksu-template/webroot/* ksu-build/webroot/
          
          chmod +x ksu-build/bin/ech-workers
          chmod +x ksu-build/scripts/*
          chmod +x ksu-build/*.sh
          
          cd ksu-build
          zip -r ../ech-workers-ksu-arm64.zip ./*
          cd ..

      - name: 上传到 Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ech-workers-ksu-arm64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
